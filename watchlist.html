<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kathi's Watchlist</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --netflix: #E50914;
    --prime: #00A8E0;
    --disney: #113CCF;
    --hbo: #8B5CF6;
    --bg: #0a0a0f;
    --card-bg: #13131a;
    --card-border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --accent: #f0c040;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #000 0%, transparent 100%);
    padding: 24px 32px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .header-stats b { color: var(--text); font-size: 1rem; }

  /* CONTROLS */
  .controls {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color .2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .filter-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .pill.netflix.active { background: var(--netflix); border-color: var(--netflix); color: #fff; }
  .pill.prime.active { background: var(--prime); border-color: var(--prime); color: #fff; }
  .pill.disney.active { background: var(--disney); border-color: var(--disney); color: #fff; }
  .pill.hbo.active { background: var(--hbo); border-color: var(--hbo); color: #fff; }

  /* ADD BUTTON */
  .btn-add {
    margin-left: auto;
    padding: 10px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

  /* SECTIONS */
  .section {
    padding: 0 32px 32px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    padding-top: 12px;
  }

  .service-badge {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .service-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }

  .service-dot.netflix { background: var(--netflix); box-shadow: 0 0 12px var(--netflix)44; }
  .service-dot.prime { background: var(--prime); box-shadow: 0 0 12px var(--prime)44; }
  .service-dot.disney { background: var(--disney); box-shadow: 0 0 12px var(--disney)44; }
  .service-dot.hbo { background: var(--hbo); box-shadow: 0 0 12px var(--hbo)44; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 2px;
  }

  .section-title.netflix { color: var(--netflix); }
  .section-title.prime { color: var(--prime); }
  .section-title.disney { color: var(--disney); }
  .section-title.hbo { color: var(--hbo); }

  .section-count {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    border: 1px solid var(--card-border);
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius);
    border: 1px solid var(--card-border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }

  thead th {
    background: #0d0d15;
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }

  tbody tr {
    border-top: 1px solid var(--card-border);
    transition: background .15s;
  }

  tbody tr:hover { background: #ffffff06; }

  tbody tr.hidden-row { display: none; }

  td {
    padding: 11px 14px;
    vertical-align: middle;
  }

  .td-title {
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .type-badge.serie { background: #1a2a3a; color: #6dc0f0; }
  .type-badge.film { background: #2a1a2a; color: #d090e0; }

  .genre-tag {
    display: inline-block;
    background: #1a1a28;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.7rem;
    color: #9090b8;
    margin: 1px;
  }

  .imdb { color: var(--accent); font-weight: 700; }
  .rt { color: #fa5c5c; font-weight: 700; }
  .rt.good { color: #4dca7a; }

  /* STATUS SELECT */
  .status-select {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }

  .status-select.angefangen { border-color: var(--accent); color: var(--accent); }
  .status-select.gesehen { border-color: #4dca7a; color: #4dca7a; }

  /* PRIORITY SELECT */
  .prio-select {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }

  .prio-select.hoch { border-color: #fa5c5c; color: #fa5c5c; }
  .prio-select.mittel { border-color: var(--muted); color: var(--muted); }
  .prio-select.niedrig { border-color: #4dca7a; color: #4dca7a; }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 1rem;
    transition: color .2s;
  }

  .delete-btn:hover { color: #fa5c5c; }

  .edit-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 0.9rem;
    transition: color .2s;
  }
  .edit-btn:hover { color: var(--accent); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #13131a;
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 32px;
    width: 90%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    margin-bottom: 24px;
    color: var(--accent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  .form-group label {
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 10px 20px;
    background: none;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-cancel:hover { border-color: var(--text); color: var(--text); }

  .btn-save {
    padding: 10px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }

  .btn-save:hover { opacity: 0.9; }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .divider {
    height: 1px;
    background: var(--card-border);
    margin: 4px 0;
  }

  @media (max-width: 768px) {
    header { padding: 16px; flex-wrap: wrap; gap: 12px; }
    .controls { padding: 12px 16px; }
    .section { padding: 0 16px 24px; }
    .form-grid { grid-template-columns: 1fr; }
    .header-stats { font-size: 0.72rem; gap: 12px; }
  }

  .service-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .service-tag.netflix { background: #E5091420; color: var(--netflix); }
  .service-tag.prime { background: #00A8E020; color: var(--prime); }
  .service-tag.disney { background: #113CCF20; color: #5577ff; }
  .service-tag.hbo { background: #8B5CF620; color: #a78bfa; }


  @media (max-width: 768px) {
    .suggestion-banner { margin: 0 16px 8px; padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
    .suggestion-divider { display: none; }
    .suggestion-label { font-size: 0.6rem; }
  }

</style>
</head>
<body>

<header>
  <div class="logo">KATHI'S <span>WATCHLIST</span></div>
  <div class="header-stats">
    <div><b id="total-count">0</b><br>Gesamt</div>
    <div><b id="netflix-count">0</b><br>Netflix</div>
    <div><b id="prime-count">0</b><br>Prime</div>
    <div><b id="disney-count">0</b><br>Disney+</div>
    <div><b id="hbo-count">0</b><br>HBO Max</div>
    <div><b id="gesehen-count">0</b><br>Gesehen</div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Titel suchen…" oninput="applyFilters()">
  </div>

  <div class="filter-pills">
    <button class="pill active" data-filter="all" onclick="setFilter('all', this)">Alle</button>
    <button class="pill netflix" data-filter="Netflix" onclick="setFilter('Netflix', this)">Netflix</button>
    <button class="pill prime" data-filter="Amazon Prime" onclick="setFilter('Amazon Prime', this)">Prime</button>
    <button class="pill disney" data-filter="Disney+" onclick="setFilter('Disney+', this)">Disney+</button>
    <button class="pill hbo" data-filter="HBO Max" onclick="setFilter('HBO Max', this)">HBO Max</button>
    <button class="pill" data-filter="Serie" onclick="setFilter('Serie', this)">Serien</button>
    <button class="pill" data-filter="Film" onclick="setFilter('Film', this)">Filme</button>
    <button class="pill" data-filter="Gemerkt" onclick="setFilter('Gemerkt', this)">Gemerkt</button>
    <button class="pill" data-filter="Angefangen" onclick="setFilter('Angefangen', this)">Angefangen</button>
    <button class="pill" data-filter="Gesehen" onclick="setFilter('Gesehen', this)">Gesehen</button>
  </div>

  <button class="btn-add" onclick="openModal()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    Hinzufügen
  </button>
</div>



<!-- Sections -->
<div id="sections-container"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>Titel bearbeiten</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Titel</label>
        <input type="text" id="e-titel" placeholder="z.B. Breaking Bad">
      </div>
      <div class="form-group">
        <label>Typ</label>
        <select id="e-typ">
          <option value="Serie">Serie</option>
          <option value="Film">Film</option>
        </select>
      </div>
      <div class="form-group">
        <label>Streaming-Dienst</label>
        <select id="e-dienst">
          <option value="Netflix">Netflix</option>
          <option value="Amazon Prime">Amazon Prime</option>
          <option value="HBO Max">HBO Max</option>
          <option value="Disney+">Disney+</option>
        </select>
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="e-genre" placeholder="z.B. Drama, Thriller">
      </div>
      <div class="form-group">
        <label>Jahr</label>
        <input type="number" id="e-jahr" placeholder="z.B. 2023">
      </div>
      <div class="form-group">
        <label>IMDb</label>
        <input type="text" id="e-imdb" placeholder="z.B. 8.2">
      </div>
      <div class="form-group">
        <label>Rotten Tomatoes</label>
        <input type="text" id="e-rt" placeholder="z.B. 94%">
      </div>
      <div class="form-group">
        <label>Staffeln / Laufzeit</label>
        <input type="text" id="e-staffeln" placeholder="z.B. 3 Staffeln">
      </div>
      <div class="form-group">
        <label>Serien-Status</label>
        <select id="e-serieStatus">
          <option value="">–</option>
          <option value="Laufend">Laufend</option>
          <option value="Abgeschlossen">Abgeschlossen</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priorität</label>
        <select id="e-prio">
          <option value="Hoch">Hoch</option>
          <option value="Mittel">Mittel</option>
          <option value="Niedrig">Niedrig</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="e-status">
          <option value="Gemerkt">Gemerkt</option>
          <option value="Angefangen">Angefangen</option>
          <option value="Gesehen">Gesehen</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Notizen</label>
        <input type="text" id="e-notiz" placeholder="Optionale Notiz">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveEdit()">Speichern</button>
    </div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Neuen Titel hinzufügen</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Titel</label>
        <input type="text" id="f-titel" placeholder="z.B. Breaking Bad">
      </div>
      <div class="form-group">
        <label>Typ</label>
        <select id="f-typ">
          <option value="Serie">Serie</option>
          <option value="Film">Film</option>
        </select>
      </div>
      <div class="form-group">
        <label>Streaming-Dienst</label>
        <select id="f-dienst">
          <option value="Netflix">Netflix</option>
          <option value="Amazon Prime">Amazon Prime</option>
          <option value="HBO Max">HBO Max</option>
          <option value="Disney+">Disney+</option>
        </select>
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="f-genre" placeholder="z.B. Drama, Thriller">
      </div>
      <div class="form-group">
        <label>Jahr</label>
        <input type="number" id="f-jahr" placeholder="z.B. 2023">
      </div>
      <div class="form-group">
        <label>IMDb</label>
        <input type="text" id="f-imdb" placeholder="z.B. 8.2">
      </div>
      <div class="form-group">
        <label>Rotten Tomatoes</label>
        <input type="text" id="f-rt" placeholder="z.B. 94%">
      </div>
      <div class="form-group">
        <label>Staffeln / Laufzeit</label>
        <input type="text" id="f-staffeln" placeholder="z.B. 5 Staffeln / 142 Min.">
      </div>
      <div class="form-group">
        <label>Serien-Status</label>
        <select id="f-serie-status">
          <option value="">–</option>
          <option value="Laufend">Laufend</option>
          <option value="Abgeschlossen">Abgeschlossen</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priorität</label>
        <select id="f-prio">
          <option value="Mittel">Mittel</option>
          <option value="Hoch">Hoch</option>
          <option value="Niedrig">Niedrig</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Gemerkt">Gemerkt</option>
          <option value="Angefangen">Angefangen</option>
          <option value="Gesehen">Gesehen</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Beschreibung (optional)</label>
        <textarea id="f-notiz" placeholder="Kurze Beschreibung oder Notiz…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="addTitle()">Speichern</button>
    </div>
  </div>
</div>

<script>
// =============================
// DATA
// =============================
let data = [
  // ---- NETFLIX ----
  { id:1,  titel:"Avatar – Der Herr der Elemente", typ:"Serie", dienst:"Netflix", genre:"Action, Abenteuer, Animation", jahr:2024, imdb:"7.5", rt:"67%", staffeln:"1 Staffel (laufend)", serieStatus:"Laufend", status:"Gemerkt", prio:"Mittel", notiz:"Netflix-Neuverfilmung" },
  { id:2,  titel:"Ginny & Georgia", typ:"Serie", dienst:"Netflix", genre:"Drama, Komödie", jahr:2021, imdb:"7.7", rt:"53%", staffeln:"3 Staffeln", serieStatus:"Laufend", status:"Gemerkt", prio:"Mittel", notiz:"" },
  { id:3,  titel:"Fargo", typ:"Serie", dienst:"Netflix", genre:"Crime, Drama", jahr:2014, imdb:"8.9", rt:"97%", staffeln:"5 Staffeln", serieStatus:"Abgeschlossen", status:"Gemerkt", prio:"Hoch", notiz:"" },

];

let nextId = 400;
let activeFilter = 'all';
let activeSearch = '';

// Remove duplicate "The Boys" entry
data = data.filter(d => d.id !== 150);

function applyFilters() {
  activeSearch = document.getElementById('search').value.toLowerCase();
  renderAll();
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function matchesFilter(item) {
  const f = activeFilter;
  if (f !== 'all') {
    if (f === 'Netflix' || f === 'Amazon Prime' || f === 'HBO Max' || f === 'Disney+') {
      if (item.dienst !== f) return false;
    } else if (f === 'Serie' || f === 'Film') {
      if (item.typ !== f) return false;
    } else if (f === 'Gemerkt' || f === 'Angefangen' || f === 'Gesehen') {
      if (item.status !== f) return false;
    }
  }
  if (activeSearch) {
    const hay = (item.titel + item.genre + item.notiz).toLowerCase();
    if (!hay.includes(activeSearch)) return false;
  }
  return true;
}

function renderAll() {
  const container = document.getElementById('sections-container');
  const services = ['Netflix', 'Amazon Prime', 'HBO Max', 'Disney+'];
  const colors = { Netflix: 'netflix', 'Amazon Prime': 'prime', 'HBO Max': 'hbo', 'Disney+': 'disney' };

  let html = '';
  let totalVisible = 0;
  const counts = { Netflix: 0, 'Amazon Prime': 0, 'HBO Max': 0, 'Disney+': 0, gesehen: 0 };

  services.forEach(svc => {
    const items = data.filter(d => d.dienst === svc && matchesFilter(d));
    counts[svc] = data.filter(d => d.dienst === svc).length;
    counts.gesehen += data.filter(d => d.dienst === svc && d.status === 'Gesehen').length;
    totalVisible += items.length;

    const cls = colors[svc];
    if (items.length === 0 && activeFilter !== 'all' && activeFilter !== svc) return;

    html += `
      <div class="section">
        <div class="section-header">
          <div class="service-badge">
            <div class="service-dot ${cls}"></div>
            <div class="section-title ${cls}">${svc === 'Amazon Prime' ? 'AMAZON PRIME' : svc === 'HBO Max' ? 'HBO MAX' : svc.toUpperCase()}</div>
          </div>
          <div class="section-count">${items.length} Titel</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Titel</th>
                <th>Typ</th>
                <th>Genre</th>
                <th>Jahr</th>
                <th>IMDb</th>
                <th>RT</th>
                <th>Staffeln/Laufzeit</th>
                <th>Status</th>
                <th>Priorität</th>
                <th>Notizen</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
    `;

    if (items.length === 0) {
      html += `<tr><td colspan="11" class="no-results">Keine Titel gefunden</td></tr>`;
    } else {
      items.forEach(item => {
        const rtClass = item.rt && item.rt !== '–' && parseInt(item.rt) >= 70 ? 'good' : '';
        const genres = item.genre.split(',').map(g => `<span class="genre-tag">${g.trim()}</span>`).join('');
        html += `
          <tr data-id="${item.id}">
            <td class="td-title" title="${item.titel}">${item.titel}</td>
            <td><span class="type-badge ${item.typ.toLowerCase()}">${item.typ}</span></td>
            <td>${genres}</td>
            <td>${item.jahr}</td>
            <td class="imdb">${item.imdb || '–'}</td>
            <td class="rt ${rtClass}">${item.rt || '–'}</td>
            <td>${item.staffeln}${item.serieStatus ? ' · ' + item.serieStatus : ''}</td>
            <td>
              <select class="status-select ${item.status.toLowerCase().replace(' ','-')}" onchange="updateField(${item.id},'status',this.value);this.className='status-select '+this.value.toLowerCase().replace(' ','-')">
                <option ${item.status==='Gemerkt'?'selected':''}>Gemerkt</option>
                <option ${item.status==='Angefangen'?'selected':''}>Angefangen</option>
                <option ${item.status==='Gesehen'?'selected':''}>Gesehen</option>
              </select>
            </td>
            <td>
              <select class="prio-select ${item.prio.toLowerCase()}" onchange="updateField(${item.id},'prio',this.value);this.className='prio-select '+this.value.toLowerCase()">
                <option ${item.prio==='Hoch'?'selected':''}>Hoch</option>
                <option ${item.prio==='Mittel'?'selected':''}>Mittel</option>
                <option ${item.prio==='Niedrig'?'selected':''}>Niedrig</option>
              </select>
            </td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:0.78rem">${item.notiz||'–'}</td>
            <td style="white-space:nowrap">
              <button class="edit-btn" onclick="openEditModal(${item.id})" title="Bearbeiten">✏️</button>
              <button class="delete-btn" onclick="deleteTitle(${item.id})" title="Löschen">✕</button>
            </td>
          </tr>
        `;
      });
    }

    html += `</tbody></table></div></div>`;
  });

  container.innerHTML = html;

  // Update stats
  document.getElementById('total-count').textContent = data.length;
  document.getElementById('netflix-count').textContent = counts['Netflix'];
  document.getElementById('prime-count').textContent = counts['Amazon Prime'];
  document.getElementById('hbo-count').textContent = counts['HBO Max'];
  document.getElementById('disney-count').textContent = counts['Disney+'];
  document.getElementById('gesehen-count').textContent = data.filter(d => d.status === 'Gesehen').length;
}

function updateField(id, field, value) {
  const item = data.find(d => d.id === id);
  if (item) {
    item[field] = value;
  }
}

function deleteTitle(id) {
  if (!confirm('Titel wirklich löschen?')) return;
  data = data.filter(d => d.id !== id);
  renderAll();
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-titel').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  // Reset form
  ['f-titel','f-genre','f-jahr','f-imdb','f-rt','f-staffeln','f-notiz'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function addTitle() {
  const titel = document.getElementById('f-titel').value.trim();
  if (!titel) { alert('Bitte einen Titel eingeben!'); return; }

  const newItem = {
    id: nextId++,
    titel,
    typ: document.getElementById('f-typ').value,
    dienst: document.getElementById('f-dienst').value,
    genre: document.getElementById('f-genre').value || 'Unbekannt',
    jahr: parseInt(document.getElementById('f-jahr').value) || new Date().getFullYear(),
    imdb: document.getElementById('f-imdb').value || '–',
    rt: document.getElementById('f-rt').value || '–',
    staffeln: document.getElementById('f-staffeln').value || '–',
    serieStatus: document.getElementById('f-serie-status').value,
    prio: document.getElementById('f-prio').value,
    status: document.getElementById('f-status').value,
    notiz: document.getElementById('f-notiz').value || '',
  };

  data.push(newItem);
  closeModal();
  renderAll();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Initial render
renderAll();

// =============================
// BEARBEITEN
// =============================
let editingId = null;

function openEditModal(id) {
  const item = data.find(d => d.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('e-titel').value = item.titel || '';
  document.getElementById('e-typ').value = item.typ || 'Serie';
  document.getElementById('e-dienst').value = item.dienst || 'Netflix';
  document.getElementById('e-genre').value = item.genre || '';
  document.getElementById('e-jahr').value = item.jahr || '';
  document.getElementById('e-imdb').value = item.imdb || '';
  document.getElementById('e-rt').value = item.rt || '';
  document.getElementById('e-staffeln').value = item.staffeln || '';
  document.getElementById('e-serieStatus').value = item.serieStatus || '';
  document.getElementById('e-prio').value = item.prio || 'Mittel';
  document.getElementById('e-status').value = item.status || 'Gemerkt';
  document.getElementById('e-notiz').value = item.notiz || '';
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editingId = null;
}

function saveEdit() {
  if (!editingId) return;
  const item = data.find(d => d.id === editingId);
  if (!item) return;
  item.titel = document.getElementById('e-titel').value.trim() || item.titel;
  item.typ = document.getElementById('e-typ').value;
  item.dienst = document.getElementById('e-dienst').value;
  item.genre = document.getElementById('e-genre').value;
  item.jahr = parseInt(document.getElementById('e-jahr').value) || item.jahr;
  item.imdb = document.getElementById('e-imdb').value || '–';
  item.rt = document.getElementById('e-rt').value || '–';
  item.staffeln = document.getElementById('e-staffeln').value || '–';
  item.serieStatus = document.getElementById('e-serieStatus').value;
  item.prio = document.getElementById('e-prio').value;
  item.status = document.getElementById('e-status').value;
  item.notiz = document.getElementById('e-notiz').value;
  closeEditModal();
  renderAll();
}

document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});



</script>
